<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ヤフースコトク</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e0e0e0;font-family:'Hiragino Sans','Yu Gothic',sans-serif;min-height:100vh}
#app{max-width:900px;margin:0 auto;padding:12px}
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 0 8px}
.logo{font-size:20px;font-weight:700;color:#00e5ff;letter-spacing:1px}
.cats{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.cat{background:#1a1a1a;border:1px solid #333;color:#aaa;padding:5px 12px;border-radius:20px;cursor:pointer;font-size:12px;transition:all .2s}
.cat.active{background:#00e5ff;color:#000;border-color:#00e5ff;font-weight:700}
.filter-row{display:flex;align-items:center;gap:10px;margin:8px 0;font-size:12px;color:#aaa}
.filter-row input[type=range]{flex:1;accent-color:#00e5ff}
.search-btns{display:flex;gap:8px;margin:10px 0}
.search-btn{background:#1a1a1a;border:1.5px solid #00e5ff;color:#00e5ff;padding:10px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;transition:all .2s;flex:1;max-width:220px}
.search-btn:hover{background:#00e5ff;color:#000}
.search-btn.active-btn{background:#00e5ff;color:#000}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-top:12px}
.card{background:#141414;border:1px solid #222;border-radius:10px;padding:12px;position:relative;transition:border-color .2s}
.card:hover{border-color:#00e5ff}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.card-name{font-size:13px;font-weight:700;color:#fff;flex:1;margin-right:8px;line-height:1.4}
.card-img{width:100%;height:140px;object-fit:contain;border-radius:6px;margin-bottom:8px;background:#0d0d0d}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;white-space:nowrap}
.badge-hot{background:#00e5ff;color:#000}
.badge-high{background:#00b8cc;color:#000}
.prices{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.price-item{background:#0d0d0d;border-radius:6px;padding:6px 8px}
.price-label{font-size:10px;color:#777;margin-bottom:2px}
.price-val{font-size:13px;font-weight:700;color:#fff}
.profit-box{background:#001a1a;border:1px solid #00e5ff44;border-radius:6px;padding:6px 10px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.profit-label{font-size:10px;color:#00e5ff88}
.profit-val{font-size:16px;font-weight:700;color:#00e5ff}
.profit-sub{font-size:12px;color:#00e5ff88}
.store-name{font-size:11px;color:#666;margin-bottom:6px}
.btn-row{display:flex;gap:6px;margin-top:8px}
.btn{padding:6px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:none;transition:all .2s;flex:1}
.btn-page{background:#1a1a1a;color:#00e5ff;border:1px solid #00e5ff44}
.btn-page:hover{background:#00e5ff;color:#000}
.btn-x{background:#1a1a1a;color:#00e5ff;border:1px solid #00e5ff44}
.btn-x:hover{background:#00e5ff;color:#000}
.btn-spread{background:#1a1a1a;color:#00e5ff;border:1px solid #00e5ff44;font-size:11px}
.btn-spread:hover{background:#00e5ff;color:#000}
.spread-links{display:none;flex-direction:column;gap:4px;margin-top:6px}
.spread-links.open{display:flex}
.spread-link{padding:5px 8px;border-radius:5px;font-size:11px;cursor:pointer;border:1px solid #00e5ff22;color:#00e5ff;background:#0d0d0d;text-align:left;transition:background .2s}
.spread-link:hover{background:#001a1a;color:#fff}
.timestamp{font-size:10px;color:#444;margin-top:6px}
.loading{text-align:center;color:#00e5ff;padding:40px;font-size:14px}
.footer{text-align:center;font-size:10px;color:#444;margin:20px 0 8px}
#no-result{display:none;text-align:center;color:#555;padding:30px;font-size:13px}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo">ヤフースコトク</div>
    <div style="font-size:10px;color:#444">非公式ツール</div>
  </div>
  <div class="cats">
    <div class="cat active" onclick="setCategory('all',this)">オールジャンル</div>
    <div class="cat" onclick="setCategory('game',this)">ゲーム</div>
    <div class="cat" onclick="setCategory('earphone',this)">イヤホン</div>
    <div class="cat" onclick="setCategory('kaden',this)">家電</div>
    <div class="cat" onclick="setCategory('smartphone',this)">スマホ</div>
    <div class="cat" onclick="setCategory('camera',this)">カメラ</div>
  </div>
  <div class="filter-row">
    <span>フィルター</span>
    <input type="range" id="rateSlider" min="0" max="80" value="0" step="1" oninput="updateSlider()">
    <span id="rateVal">0%</span><span>以上</span>
  </div>
  <div class="search-btns">
    <button class="search-btn" id="btn-cheap" onclick="showCards('cheap')">ここから検索　安い順</button>
    <button class="search-btn" id="btn-new" onclick="showCards('new')">ここから検索　新着順</button>
  </div>
  <div class="cards" id="cards"><div class="loading">読み込み中...</div></div>
  <div id="no-result">条件に合う商品が見つかりませんでした</div>
  <div class="footer">本サービスは非公式ツールです。価格は参考値です。</div>
</div>

<script>
var currentCategory = 'all';
var currentSort = 'new';
var currentMinRate = 0;
var allItems = [];

// items.jsonを読み込む
fetch('./items.json')
  .then(function(res){ return res.json(); })
  .then(function(data){
    allItems = data;
    showCards('new');
  })
  .catch(function(e){
    document.getElementById('cards').innerHTML = '<div class="loading" style="color:#f66">データ読み込みエラー</div>';
  });

function setCategory(cat, el){
  currentCategory = cat;
  document.querySelectorAll('.cat').forEach(function(e){ e.classList.remove('active'); });
  el.classList.add('active');
  showCards(currentSort);
}

function updateSlider(){
  currentMinRate = parseInt(document.getElementById('rateSlider').value);
  document.getElementById('rateVal').textContent = currentMinRate + '%';
  showCards(currentSort);
}

function showCards(sortType){
  currentSort = sortType;
  document.getElementById('btn-cheap').classList.remove('active-btn');
  document.getElementById('btn-new').classList.remove('active-btn');
  document.getElementById(sortType === 'cheap' ? 'btn-cheap' : 'btn-new').classList.add('active-btn');

  var filtered = allItems.filter(function(item){
    return currentCategory === 'all' || true;
  });

  if(sortType === 'cheap'){
    filtered.sort(function(a,b){ return a.price - b.price; });
  } else {
    filtered.sort(function(a,b){ return new Date(b.fetched_at) - new Date(a.fetched_at); });
  }

  var container = document.getElementById('cards');
  var noResult = document.getElementById('no-result');
  if(filtered.length === 0){
    container.innerHTML = '';
    noResult.style.display = 'block';
    return;
  }
  noResult.style.display = 'none';

  var html = '';
  for(var i = 0; i < Math.min(filtered.length, 100); i++){
    var item = filtered[i];
    var name = item.name || '商品名不明';
    var price = item.price || 0;
    var image = item.image || '';
    var url = item.url || '#';
    var store = item.store || '';
    var fetched = item.fetched_at ? item.fetched_at.replace('T',' ').substring(0,16) : '';

    var xText = encodeURIComponent('【ヤフースコトク】' + name + ' ¥' + price.toLocaleString() + ' #ヤフーショッピング #お得');

    html += '<div class="card">';
    html += '<div class="card-top"><div class="card-name">' + name + '</div></div>';
    if(image) html += '<img class="card-img" src="' + image + '" alt="" onerror="this.style.display=\'none\'">';
    html += '<div class="prices">';
    html += '<div class="price-item"><div class="price-label">価格</div><div class="price-val">¥' + price.toLocaleString() + '</div></div>';
    html += '<div class="price-item"><div class="price-label">ストア</div><div class="price-val" style="font-size:11px">' + store + '</div></div>';
    html += '</div>';
    html += '<div class="btn-row">';
    html += '<button class="btn btn-page" onclick="window.open(\'' + url + '\',\'_blank\')">商品ページ</button>';
    html += '<button class="btn btn-x" onclick="window.open(\'https://twitter.com/intent/tweet?text=' + xText + '\',\'_blank\')">Xでシェア</button>';
    html += '<button class="btn btn-spread" onclick="toggleSpread(' + i + ')">相場を見る ▼</button>';
    html += '</div>';
    html += '<div class="spread-links" id="spread-' + i + '">';
    html += '<button class="spread-link" onclick="window.open(\'https://www.mercari.com/jp/search/?keyword=' + encodeURIComponent(name) + '\',\'_blank\')">メルカリで相場を見る</button>';
    html += '<button class="spread-link" onclick="window.open(\'https://www.amazon.co.jp/s?k=' + encodeURIComponent(name) + '\',\'_blank\')">Amazonで相場を見る</button>';
    html += '<button class="spread-link" onclick="window.open(\'https://www.ebay.com/sch/i.html?_nkw=' + encodeURIComponent(name) + '\',\'_blank\')">eBayで相場を見る</button>';
    html += '</div>';
    html += '<div class="timestamp">取得：' + fetched + '</div>';
    html += '</div>';
  }
  container.innerHTML = html;
}

function toggleSpread(id){
  document.getElementById('spread-' + id).classList.toggle('open');
}
</script>
</body>
</html>
